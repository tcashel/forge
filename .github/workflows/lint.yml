name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  biome:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install --frozen-lockfile 2>&1 | tee /tmp/install.txt || true

      - name: Run biome
        run: |
          bun run lint > /tmp/biome.txt 2>&1 || true
          echo "=== install output ===" > biome-diagnostic.txt
          cat /tmp/install.txt >> biome-diagnostic.txt
          echo "" >> biome-diagnostic.txt
          echo "=== biome check output ===" >> biome-diagnostic.txt
          cat /tmp/biome.txt >> biome-diagnostic.txt

      - name: Commit diagnostic output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add biome-diagnostic.txt
          git commit -m "ci: biome diagnostic output [skip ci]" || true
          git push || true

      - name: Verify biome passes
        run: bun run lint
