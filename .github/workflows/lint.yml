name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  biome:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run biome auto-fix
        run: |
          npx @biomejs/biome check --write . 2>&1 | tee /tmp/biome-fix.txt || true

      - name: Capture remaining errors
        run: |
          npx @biomejs/biome check . 2>&1 | tee /tmp/biome-check.txt
          echo "EXIT_CODE=$?" >> $GITHUB_ENV
        continue-on-error: true

      - name: Commit auto-fixed changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git diff --cached --stat
            git commit -m "style: auto-fix biome lint/format issues"
            git push
          else
            echo "No changes to commit"
          fi

      - name: Post results as PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            let body = '## Biome CI Results\n\n';
            if (fs.existsSync('/tmp/biome-fix.txt')) {
              const fix = fs.readFileSync('/tmp/biome-fix.txt', 'utf8');
              body += '### Auto-fix output\n```\n' + fix.slice(-2000) + '\n```\n\n';
            }
            if (fs.existsSync('/tmp/biome-check.txt')) {
              const check = fs.readFileSync('/tmp/biome-check.txt', 'utf8');
              body += '### Remaining errors\n```\n' + check.slice(-3000) + '\n```\n';
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: body,
            });

      - name: Final check
        run: npx @biomejs/biome check .
