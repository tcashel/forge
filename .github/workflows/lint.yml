name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  biome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        id: install
        run: |
          bun install --frozen-lockfile 2>&1 | tee /tmp/install-output.txt
          exit ${PIPESTATUS[0]}
        continue-on-error: true

      - name: Run biome check
        id: biome
        if: steps.install.outcome == 'success'
        run: |
          bun run lint 2>&1 | tee /tmp/biome-output.txt
          exit ${PIPESTATUS[0]}
        continue-on-error: true

      - name: Post diagnostic output as comment
        if: always() && (steps.install.outcome == 'failure' || steps.biome.outcome == 'failure')
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '';
            if (fs.existsSync('/tmp/install-output.txt')) {
              const install = fs.readFileSync('/tmp/install-output.txt', 'utf8');
              body += `### Install Output (last 1500 chars)\n\`\`\`\n${install.slice(-1500)}\n\`\`\`\n\n`;
            }
            if (fs.existsSync('/tmp/biome-output.txt')) {
              const biome = fs.readFileSync('/tmp/biome-output.txt', 'utf8');
              body += `### Biome Check Output (last 3000 chars)\n\`\`\`\n${biome.slice(-3000)}\n\`\`\``;
            }
            if (!body) body = '### CI failed but no output captured';
            if (context.payload.pull_request) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: body,
              });
            }

      - name: Fail if install or biome failed
        if: always() && (steps.install.outcome == 'failure' || steps.biome.outcome == 'failure')
        run: exit 1
