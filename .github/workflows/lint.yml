name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  biome:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        id: install
        run: bun install --frozen-lockfile 2>&1 | tee /tmp/install.log
        continue-on-error: true

      - name: Run biome
        id: biome
        if: steps.install.outcome == 'success'
        run: bun run lint 2>&1 | tee /tmp/biome.log
        continue-on-error: true

      - name: Post diagnostic comment
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "## Biome CI Diagnostic"
            echo ""
            echo "**bun version:** $(bun --version 2>/dev/null || echo 'N/A')"
            echo "**install outcome:** ${{ steps.install.outcome }}"
            echo "**biome outcome:** ${{ steps.biome.outcome }}"
            echo ""
            echo "<details><summary>Install log</summary>"
            echo ""
            echo '```'
            head -100 /tmp/install.log 2>/dev/null || echo "no install log"
            echo '```'
            echo "</details>"
            echo ""
            echo "<details><summary>Biome log</summary>"
            echo ""
            echo '```'
            head -200 /tmp/biome.log 2>/dev/null || echo "no biome log"
            echo '```'
            echo "</details>"
          } > /tmp/comment.md
          gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/comment.md || echo "gh pr comment failed: $?"

      - name: Verify biome passes
        if: steps.install.outcome == 'success'
        run: bun run lint
