name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  biome:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1"

      - name: Install deps
        id: install
        run: bun install --frozen-lockfile 2>&1 | tee /tmp/install.log
        continue-on-error: true

      - name: Biome check
        id: lint
        if: steps.install.outcome == 'success'
        run: bun run lint 2>&1 | tee /tmp/lint.log
        continue-on-error: true

      - name: Post diagnostics on failure
        if: failure() || steps.install.outcome == 'failure' || steps.lint.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '### CI Lint Diagnostics\n\n';
            body += '**bun version:** ' + require('child_process').execSync('bun --version').toString().trim() + '\n\n';
            if (fs.existsSync('/tmp/install.log')) {
              const log = fs.readFileSync('/tmp/install.log', 'utf8').slice(-3000);
              body += '<details><summary>Install output</summary>\n\n```\n' + log + '\n```\n</details>\n\n';
            }
            if (fs.existsSync('/tmp/lint.log')) {
              const log = fs.readFileSync('/tmp/lint.log', 'utf8').slice(-3000);
              body += '<details><summary>Lint output</summary>\n\n```\n' + log + '\n```\n</details>\n\n';
            }
            const issue_number = context.payload.pull_request?.number;
            if (issue_number) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body
              });
            }

      - name: Fail if any step failed
        if: steps.install.outcome == 'failure' || steps.lint.outcome == 'failure'
        run: exit 1
