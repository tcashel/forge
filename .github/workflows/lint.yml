name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  biome:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Install Bun
        id: bun-setup
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
        continue-on-error: true

      - name: Fallback Bun install
        if: steps.bun-setup.outcome == 'failure'
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Post failure diagnostic
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            let diag = '';
            try { diag += '## Bun version\n```\n' + execSync('bun --version 2>&1 || echo "bun not found"').toString() + '```\n'; } catch(e) { diag += 'bun --version failed\n'; }
            try { diag += '## Install output\n```\n' + execSync('bun install --frozen-lockfile 2>&1 || true').toString().slice(0, 3000) + '```\n'; } catch(e) {}
            try { diag += '## Lint output\n```\n' + execSync('bun run lint 2>&1 || true').toString().slice(0, 3000) + '```\n'; } catch(e) {}
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### CI Diagnostic\nsetup-bun outcome: ${{ steps.bun-setup.outcome }}\n\n${diag}`
            });
