name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  biome:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Auto-fix with biome
        run: bun run check
        continue-on-error: true

      - name: Check for changes
        id: diff
        run: |
          git diff --name-only > /tmp/changed-files.txt
          if [ -s /tmp/changed-files.txt ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "### Biome auto-fixed these files:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat /tmp/changed-files.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Diff:" >> $GITHUB_STEP_SUMMARY
            echo '```diff' >> $GITHUB_STEP_SUMMARY
            git diff >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No formatting changes needed." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Commit and push fixes
        if: steps.diff.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "style: auto-fix biome lint/format issues"
          git push

      - name: Verify biome passes
        id: verify
        run: bun run lint 2>&1 | tee /tmp/biome-verify.txt
        continue-on-error: true

      - name: Post remaining errors
        if: steps.verify.outcome == 'failure'
        run: |
          echo "### Remaining biome errors after auto-fix:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/biome-verify.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Fail if biome still has errors
        if: steps.verify.outcome == 'failure'
        run: exit 1
