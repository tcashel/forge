name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  biome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1"

      - name: Install deps
        run: |
          echo "::group::bun version"
          bun --version
          echo "::endgroup::"
          bun install --frozen-lockfile

      - name: Biome check
        run: bun run lint
