name: CI Debug

on:
  pull_request:

jobs:
  debug:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        id: bun-setup
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
        continue-on-error: true

      - name: Run install
        id: install
        if: steps.bun-setup.outcome == 'success'
        run: bun install --frozen-lockfile > /tmp/install.log 2>&1
        continue-on-error: true

      - name: Run lint
        id: lint
        if: steps.install.outcome == 'success'
        run: bun run lint > /tmp/lint.log 2>&1
        continue-on-error: true

      - name: Run test
        id: test
        if: steps.install.outcome == 'success'
        run: bun run test > /tmp/test.log 2>&1
        continue-on-error: true

      - name: Post results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const fs = require('fs');
            let body = '### CI Debug Report\n\n';
            body += `| Step | Outcome |\n|---|---|\n`;
            body += `| setup-bun | ${{ steps.bun-setup.outcome }} |\n`;
            body += `| install | ${{ steps.install.outcome }} |\n`;
            body += `| lint | ${{ steps.lint.outcome }} |\n`;
            body += `| test | ${{ steps.test.outcome }} |\n\n`;
            try { body += `**Bun:** \`${execSync('bun --version 2>&1').toString().trim()}\`\n\n`; } catch { body += '**Bun:** not on PATH\n\n'; }
            const logs = [
              ['Install', '/tmp/install.log'],
              ['Lint', '/tmp/lint.log'],
              ['Test', '/tmp/test.log']
            ];
            for (const [name, path] of logs) {
              try {
                const log = fs.readFileSync(path, 'utf8').slice(-4000);
                body += `<details><summary>${name} output</summary>\n\n\`\`\`\n${log}\n\`\`\`\n</details>\n\n`;
              } catch {
                body += `_No ${name.toLowerCase()} output (step was skipped)_\n\n`;
              }
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
