name: CI Debug

on:
  pull_request:

jobs:
  debug:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        id: bun-setup
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.2"
        continue-on-error: true

      - name: Run install
        id: install
        if: steps.bun-setup.outcome == 'success'
        run: bun install --frozen-lockfile > /tmp/install.log 2>&1
        continue-on-error: true

      - name: Run lint
        id: lint
        if: steps.install.outcome == 'success'
        run: bun run lint > /tmp/lint.log 2>&1
        continue-on-error: true

      - name: Run test
        id: test
        if: steps.install.outcome == 'success'
        run: bun run test > /tmp/test.log 2>&1
        continue-on-error: true

      - name: Collect results
        if: always()
        run: |
          echo "## CI Debug Report" > /tmp/debug-report.md
          echo "" >> /tmp/debug-report.md
          echo "| Step | Outcome |" >> /tmp/debug-report.md
          echo "|---|---|" >> /tmp/debug-report.md
          echo "| setup-bun | ${{ steps.bun-setup.outcome }} |" >> /tmp/debug-report.md
          echo "| install | ${{ steps.install.outcome }} |" >> /tmp/debug-report.md
          echo "| lint | ${{ steps.lint.outcome }} |" >> /tmp/debug-report.md
          echo "| test | ${{ steps.test.outcome }} |" >> /tmp/debug-report.md
          echo "" >> /tmp/debug-report.md
          bun --version 2>&1 && echo "**Bun:** $(bun --version 2>&1)" >> /tmp/debug-report.md || echo "**Bun:** not on PATH" >> /tmp/debug-report.md
          echo "" >> /tmp/debug-report.md
          for f in install lint test; do
            if [ -f "/tmp/${f}.log" ]; then
              echo "<details><summary>${f} output</summary>" >> /tmp/debug-report.md
              echo "" >> /tmp/debug-report.md
              echo '```' >> /tmp/debug-report.md
              tail -100 "/tmp/${f}.log" >> /tmp/debug-report.md
              echo '```' >> /tmp/debug-report.md
              echo "</details>" >> /tmp/debug-report.md
              echo "" >> /tmp/debug-report.md
            else
              echo "_No ${f} output (step was skipped)_" >> /tmp/debug-report.md
              echo "" >> /tmp/debug-report.md
            fi
          done
          cat /tmp/debug-report.md

      - name: Post comment via curl
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          BODY=$(cat /tmp/debug-report.md | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')
          curl -sS -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            -d "{\"body\": ${BODY}}" || echo "Failed to post comment"

      - name: Upload debug report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-debug-report
          path: /tmp/debug-report.md
