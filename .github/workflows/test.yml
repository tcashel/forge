name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  bun-test:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        id: install
        run: bun install --frozen-lockfile 2>&1 | tee /tmp/install.log
        continue-on-error: true

      - name: Run tests
        id: test
        if: steps.install.outcome == 'success'
        run: bun run test 2>&1 | tee /tmp/test.log
        continue-on-error: true

      - name: Post diagnostic comment
        if: failure() || steps.install.outcome == 'failure' || steps.test.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const fs = require('fs');
            let body = '### Test CI Diagnostic\n\n';
            try { body += `**Bun version:** ${execSync('bun --version').toString().trim()}\n\n`; } catch { body += '**Bun:** not found\n\n'; }
            body += `**Install outcome:** ${{ steps.install.outcome }}\n`;
            body += `**Test outcome:** ${{ steps.test.outcome }}\n\n`;
            try {
              const installLog = fs.readFileSync('/tmp/install.log', 'utf8').slice(-2000);
              body += `<details><summary>Install log</summary>\n\n\`\`\`\n${installLog}\n\`\`\`\n</details>\n\n`;
            } catch {}
            try {
              const testLog = fs.readFileSync('/tmp/test.log', 'utf8').slice(-2000);
              body += `<details><summary>Test log</summary>\n\n\`\`\`\n${testLog}\n\`\`\`\n</details>\n`;
            } catch {}
            if (context.issue?.number) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }

      - name: Fail if needed
        if: steps.install.outcome == 'failure' || steps.test.outcome == 'failure'
        run: exit 1
